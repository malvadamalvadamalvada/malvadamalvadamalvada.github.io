<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* This sets the black background and centers everything */
body {
            background-color: black;
            color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrolling */
            
            /* Setting Baskerville with fallbacks in case the user doesn't have it */
            font-family: "Baskerville", "Libre Baskerville", "Times New Roman", serif;
        }

        .center-piece {
    position: absolute;
    /* This centers the image exactly */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    /* Adjust this to control the size without "blowing it up" */
    max-width: 80%; 
    height: auto;
    
    /* This puts it BEHIND the text (Layer 1) */
    z-index: 1;
    opacity: 0.8; /* Optional: makes it slightly ghostly */
}

        h1 {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            color: red;
            font-family: 'Baskerville', serif;
            text-shadow: 0 0 15px black;
            text-align: center;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>
<img src="assets/manuscript.png" class="center-piece">
    <h1>RESCHEDULING JUDGMENT DAY</h1>

</body>
